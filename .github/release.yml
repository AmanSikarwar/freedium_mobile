changelog:
  categories:
    - title: 🚀 Features
      labels:
        - feature
        - enhancement
    - title: 🐛 Bug Fixes
      labels:
        - bug
        - fix
    - title: 🛠 Maintenance
      labels:
        - chore
        - refactor
        - dependencies
    - title: 📚 Documentation
      labels:
        - docs
        - documentation
  exclude:
    labels:
      - ignore-for-release
    authors:
      - dependabot[bot]
